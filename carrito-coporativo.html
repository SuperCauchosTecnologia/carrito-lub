<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S.C. Lubricantes - Corporativo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script type="text/javascript">
     (function(){
        emailjs.init("NdAFdUwfeMmVhLG-s"); 
     })();
  </script>

  <style>
    .cart-drawer { transition: transform 0.3s ease; transform: translateX(100%); }
    .cart-drawer.open { transform: translateX(0); }
    .loader { border-top-color: #1e40af; animation: spinner 0.6s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-50 font-sans">

  <header class="bg-white shadow-md sticky top-0 z-50">
    <div class="p-4 flex justify-between items-center bg-blue-800 text-white">
      <h1 class="text-xl font-black italic uppercase">Super Cauchos <span class="text-blue-200 block text-[10px]">VENTAS CORPORATIVAS</span></h1>
      <button onclick="toggleCart()" class="relative p-2 bg-blue-900 rounded-full">
        <i class="fas fa-shopping-cart text-lg"></i>
        <span id="badge" class="absolute -top-1 -right-1 bg-yellow-400 text-black text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
      </button>
    </div>

    <div class="p-3 bg-gray-50 border-b space-y-2">
      <div class="grid grid-cols-2 gap-2">
        <select id="fCat" onchange="render()" class="p-2 border rounded-lg text-xs outline-none">
          <option value="">CATEGORÍA (Todas)</option>
        </select>
        <select id="fMar" onchange="render()" class="p-2 border rounded-lg text-xs outline-none">
          <option value="">MARCA (Todas)</option>
        </select>
      </div>
      <input id="fSearch" onkeyup="render()" type="text" placeholder="Buscar en catálogo corporativo..." class="w-full p-2 border rounded-lg text-sm outline-none">
    </div>
  </header>

  <main id="container" class="p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 pb-24"></main>

  <div id="overlay" onclick="toggleCart()" class="fixed inset-0 bg-black/50 hidden z-[60]"></div>
  <div id="cart" class="fixed top-0 right-0 w-full sm:w-96 h-full bg-white z-[70] cart-drawer shadow-2xl flex flex-col">
    <div class="p-4 bg-blue-800 text-white flex justify-between items-center">
      <h2 class="font-bold italic uppercase tracking-wider">Pedido Corporativo</h2>
      <button onclick="toggleCart()" class="text-3xl">&times;</button>
    </div>

    <div class="flex-1 overflow-y-auto p-4 space-y-4">
      <div class="bg-blue-50 p-4 rounded-xl space-y-3 border border-blue-100">
        <p class="text-[10px] font-black text-blue-600 uppercase">Datos de la Empresa / Contacto</p>
        <input type="text" id="cNombre" placeholder="Nombre de Empresa o Razón Social" class="w-full p-2 border rounded-lg text-sm">
        <input type="email" id="cCorreo" placeholder="Correo corporativo" class="w-full p-2 border rounded-lg text-sm">
        <div class="flex gap-1">
          <select id="cPais" class="p-2 border rounded-lg bg-white text-sm">
            <option value="58">🇻🇪 +58</option>
            <option value="57">🇨🇴 +57</option>
          </select>
          <input type="tel" id="cTelefono" placeholder="Teléfono" class="flex-1 p-2 border rounded-lg text-sm">
        </div>
      </div>
      <div id="cartItems" class="space-y-2"></div>
    </div>

    <div class="p-4 border-t bg-white shadow-2xl">
      <div class="flex justify-between text-2xl font-black mb-4 text-blue-800 italic">
        <span>TOTAL:</span>
        <span id="cartTotal">$0.00</span>
      </div>
      <div class="grid grid-cols-2 gap-2">
        <button onclick="procesarEnvio('ws')" class="bg-green-600 text-white py-4 rounded-xl font-bold flex flex-col items-center">
          <i class="fab fa-whatsapp text-xl mb-1"></i><span class="text-[9px]">SOLICITAR COTIZACIÓN</span>
        </button>
        <button id="btnMail" onclick="procesarEnvio('mail')" class="bg-blue-700 text-white py-4 rounded-xl font-bold flex flex-col items-center">
          <i class="fas fa-envelope text-xl mb-1"></i><span class="text-[9px]">ENVIAR POR CORREO</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    const WEB_APP_URL = 'TU_URL_DE_APPS_SCRIPT_AQUI'; // ⚠️ Pon tu URL de Google aquí
    let rawLub = [], cart = [];

    window.onload = () => {
      // ⚠️ AQUÍ CAMBIAMOS EL ACTION A getCorp
      fetch(`${WEB_APP_URL}?action=getCorp`)
        .then(res => res.json())
        .then(data => {
            rawLub = data;
            updateFilters();
            render();
        });
    };

    function updateFilters() {
      const fMar = document.getElementById('fMar');
      const mars = [...new Set(rawLub.map(i => i.marca))].filter(Boolean).sort();
      fMar.innerHTML = '<option value="">MARCA (Todas)</option>' + mars.map(m => `<option value="${m}">${m}</option>`).join('');
      const fCat = document.getElementById('fCat');
      const cats = [...new Set(rawLub.map(i => i.linea))].filter(Boolean).sort();
      fCat.innerHTML = '<option value="">CATEGORÍA (Todas)</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    function render() {
      const box = document.getElementById('container'), search = document.getElementById('fSearch').value.toLowerCase();
      const mar = document.getElementById('fMar').value, cat = document.getElementById('fCat').value;
      let filtered = rawLub.filter(i => {
        const txt = (i.nombre || "").toLowerCase() + " " + (i.marca || "").toLowerCase();
        return txt.includes(search) && (!mar || i.marca === mar) && (!cat || i.linea === cat);
      });
      box.innerHTML = filtered.map(i => `
          <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col hover:border-blue-300">
            <span class="text-[10px] bg-blue-50 text-blue-700 px-2 py-1 rounded font-black w-fit mb-2 uppercase">${i.marca}</span>
            <h3 class="font-bold text-gray-800 text-lg leading-tight mb-1 h-12 overflow-hidden">${i.nombre}</h3>
            <p class="text-[11px] text-gray-500 mb-6 uppercase">${i.tipo} | ${i.empaque}</p>
            <div class="mt-auto flex justify-between items-center pt-4 border-t border-gray-50">
              <span class="text-2xl font-black text-blue-800">$${i.precio.toFixed(2)}</span>
              <button onclick="add('${i.id}', '${i.nombre}', ${i.precio})" class="bg-blue-800 text-white px-5 py-2 rounded-xl font-black text-[10px]">AÑADIR</button>
            </div>
          </div>
      `).join('');
    }

    function add(id, name, price) {
      const x = cart.find(i => i.id === id);
      if(x) x.qty++; else cart.push({id, name, price, qty: 1});
      updateCart();
    }

    function updateCart() {
      document.getElementById('badge').innerText = cart.reduce((a,b) => a + b.qty, 0);
      document.getElementById('cartItems').innerHTML = cart.map(i => `
        <div class="flex justify-between items-center bg-white p-3 border rounded-xl">
          <div class="flex-1 mr-3"><p class="text-[10px] font-bold uppercase">${i.name}</p></div>
          <div class="flex items-center gap-2">
            <button onclick="changeQty('${i.id}',-1)" class="w-7 h-7 bg-gray-50 border rounded-lg font-bold">-</button>
            <span class="text-xs font-bold w-4 text-center">${i.qty}</span>
            <button onclick="changeQty('${i.id}',1)" class="w-7 h-7 bg-gray-50 border rounded-lg font-bold">+</button>
          </div>
        </div>
      `).join('');
      document.getElementById('cartTotal').innerText = `$${cart.reduce((a,b) => a + (b.price * b.qty), 0).toFixed(2)}`;
    }

    function changeQty(id, d) {
      const x = cart.find(i => i.id === id);
      if(x) { x.qty += d; if(x.qty <= 0) cart = cart.filter(i => i.id !== id); }
      updateCart();
    }

    function toggleCart() {
      document.getElementById('cart').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('hidden');
    }

    function procesarEnvio(metodo) {
      const nom = document.getElementById('cNombre').value;
      const mail = document.getElementById('cCorreo').value;
      const cod = document.getElementById('cPais').value;
      const tel = document.getElementById('cTelefono').value;
      const totalLabel = document.getElementById('cartTotal').innerText;

      if(!cart.length || !nom || !mail || !tel) return alert("Completa los datos corporativos.");

      if(metodo === 'ws') {
        let msg = `*SOLICITUD COTIZACIÓN CORPORATIVA*\n\n*Empresa:* ${nom}\n*Telf:* +${cod}${tel}\n\n`;
        cart.forEach(i => msg += `• ${i.name} [x${i.qty}]\n`);
        window.open(`https://wa.me/${cod}${tel.replace(/\D/g, '')}?text=${encodeURIComponent(msg)}`, '_blank');
      } else {
        const btn = document.getElementById('btnMail');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin text-xl"></i>';

        // ⚠️ ENVIAMOS 'tipo: corp' PARA QUE GOOGLE SEPA QUE ES CORPORATIVO
        const pedidoData = {
          tipo: 'corp', 
          cliente: { nombre: nom, correo: mail, codigo: cod, telefono: tel },
          carrito: cart,
          total: totalLabel
        };

        fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(pedidoData) });

        let listaTexto = cart.map(i => `• ${i.name} (x${i.qty}) - $${(i.price*i.qty).toFixed(2)}`).join('\n');
        
        emailjs.send('service_z64r2df', 'template_flf3eix', {
          name: nom + " (Corp)",
          email_to: mail,
          message: listaTexto,
          total: totalLabel,
          time: new Date().toLocaleString()
        }).then(() => {
          alert("Solicitud corporativa registrada.");
          cart = []; updateCart(); toggleCart();
        }).finally(() => {
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-envelope text-xl mb-1"></i><span class="text-[9px]">ENVIAR POR CORREO</span>';
        });
      }
    }
  </script>
</body>
</html>

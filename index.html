<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grupo Super Cauchos - Catálogo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script type="text/javascript">
    (function() {
      // !!! REEMPLAZA ESTO CON TU PUBLIC KEY DE EMAILJS !!!
      emailjs.init("NdAFdUwfeMmVhLG-s"); 
    })();
  </script>

  <style>
    .active-tab { border-bottom: 4px solid #b91c1c; color: #b91c1c; font-weight: bold; }
    .cart-drawer { transition: transform 0.3s ease; transform: translateX(100%); }
    .cart-drawer.open { transform: translateX(0); }
    .product-image { width: 100%; height: 160px; object-fit: contain; border-radius: 0.75rem; margin-bottom: 0.75rem; background-color: #fff; }
    /* Spinner de carga */
    .loader { border-top-color: #b91c1c; animation: spinner 0.6s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-100 font-sans">

  <header class="bg-white shadow-md sticky top-0 z-50">
    <div class="p-4 flex justify-between items-center bg-red-700 text-white">
      <h1 class="text-xl font-black italic uppercase tracking-tighter">Grupo Super Cauchos</h1>
      <button onclick="toggleCart()" class="relative p-2 bg-red-900 rounded-full">
        <i class="fas fa-shopping-cart text-lg"></i>
        <span id="badge" class="absolute -top-1 -right-1 bg-yellow-400 text-black text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
      </button>
    </div>

    <div class="flex text-center border-b bg-white font-bold text-sm">
      <div id="tLub" onclick="setTab('lub')" class="flex-1 py-3 cursor-pointer active-tab uppercase">Lubricantes</div>
      <div id="tCau" onclick="setTab('cau')" class="flex-1 py-3 cursor-pointer uppercase">Cauchos</div>
    </div>

    <div class="p-3 bg-gray-50 border-b space-y-2">
      <div class="grid grid-cols-2 gap-2">
        <select id="fCat" onchange="render()" class="p-2 border rounded-lg font-bold text-gray-700 bg-white text-xs outline-none">
          <option value="">CATEGORÍA (Todas)</option>
        </select>
        <select id="fMar" onchange="render()" class="p-2 border rounded-lg font-bold text-gray-700 bg-white text-xs outline-none">
          <option value="">MARCA (Todas)</option>
        </select>
      </div>
      <input id="fSearch" onkeyup="render()" type="text" placeholder="Buscar producto, marca o medida..." class="w-full p-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-red-500">
    </div>
  </header>

  <main id="container" class="p-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 pb-24">
    <div class="col-span-full flex flex-col items-center py-20 text-gray-400">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
        <p class="italic font-bold">Cargando inventario real...</p>
    </div>
  </main>

  <div id="overlay" onclick="toggleCart()" class="fixed inset-0 bg-black/50 hidden z-[60]"></div>
  <div id="cart" class="fixed top-0 right-0 w-full sm:w-96 h-full bg-white z-[70] cart-drawer shadow-2xl flex flex-col">
    <div class="p-4 bg-red-700 text-white flex justify-between items-center">
      <h2 class="font-bold italic uppercase">Tu Pedido</h2>
      <button onclick="toggleCart()" class="text-3xl">&times;</button>
    </div>

    <div class="flex-1 overflow-y-auto p-4 space-y-4">
      <div class="bg-gray-100 p-4 rounded-xl space-y-3 shadow-inner">
        <p class="text-[10px] font-black text-gray-500 uppercase">Datos de Envío/Contacto</p>
        <input type="text" id="cNombre" placeholder="Nombre completo" class="w-full p-2 border rounded text-sm">
        <input type="email" id="cCorreo" placeholder="Correo electrónico" class="w-full p-2 border rounded text-sm">
        <div class="flex gap-1">
          <select id="cPais" class="p-2 border rounded bg-white text-sm">
            <option value="58">🇻🇪 +58</option>
            <option value="57">🇨🇴 +57</option>
            <option value="1">🇺🇸 +1</option>
          </select>
          <input type="tel" id="cTelefono" placeholder="Teléfono" class="flex-1 p-2 border rounded text-sm">
        </div>
      </div>
      <div id="cartItems" class="space-y-2"></div>
    </div>

    <div class="p-4 border-t bg-white shadow-2xl">
      <div class="flex justify-between text-2xl font-black mb-4 text-red-700 italic">
        <span>TOTAL:</span>
        <span id="cartTotal">$0.00</span>
      </div>
      <div class="grid grid-cols-2 gap-2">
        <button onclick="procesarEnvio('ws')" class="bg-green-600 hover:bg-green-700 text-white py-4 rounded-xl font-bold flex flex-col items-center shadow-lg active:scale-95 transition">
          <i class="fab fa-whatsapp text-xl mb-1"></i><span class="text-[9px]">WHATSAPP</span>
        </button>
        <button onclick="procesarEnvio('mail')" class="bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold flex flex-col items-center shadow-lg active:scale-95 transition">
          <i class="fas fa-envelope text-xl mb-1"></i><span class="text-[9px]">CORREO</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    let rawLub = [], rawCau = [], cart = [], currentTab = 'lub';
    const API_URL = "https://sheetdb.io/api/v1/o8fpwx43935zm";
    const IMG_FALLBACK = 'https://drive.google.com/uc?export=view&id=1iEelG4iv-yBzaA6LdTsvIWlXrlMgG3We';

    window.onload = async () => {
      await fetchData();
      updateFilters();
      render();
    };

    async function fetchData() {
      try {
        // Cargar Lubricantes
        const resLub = await fetch(`${API_URL}?sheet=Lubricantes`);
        const dataLub = await resLub.json();
        rawLub = dataLub.map((row, i) => ({
          linea: row.LINEA || '',
          nombre: row.PRODUCTOS || '',
          tipo: row.TIPO || '',
          ref: row.REF || '',
          empaque: row.EMPAQUE || '',
          precio: parseFloat(row.PRECIO) || 0,
          marca: row.MARCA || '',
          foto: row.FOTO || IMG_FALLBACK,
          id: 'lub_' + i
        })).filter(p => p.nombre !== "");

        // Cargar Cauchos
        const resCau = await fetch(`${API_URL}?sheet=Cauchos`);
        const dataCau = await resCau.json();
        rawCau = dataCau.map((row, i) => ({
          medida: row.MEDIDA || '',
          marca: row.MARCA || '',
          contado: parseFloat(row.CONTADO) || 0,
          credito: parseFloat(row.CREDITO) || 0,
          categoria: row.CATEGORIA || '',
          foto: row.FOTO || IMG_FALLBACK,
          id: 'cau_' + i
        })).filter(p => p.marca !== "");

      } catch (e) {
        console.error("Error cargando API:", e);
        document.getElementById('container').innerHTML = `<p class="col-span-full text-center text-red-500 py-10 font-bold">Error al conectar con la base de datos.</p>`;
      }
    }

    function setTab(t) {
      currentTab = t;
      document.getElementById('tLub').className = t === 'lub' ? 'flex-1 py-3 cursor-pointer active-tab uppercase' : 'flex-1 py-3 cursor-pointer uppercase';
      document.getElementById('tCau').className = t === 'cau' ? 'flex-1 py-3 cursor-pointer active-tab uppercase' : 'flex-1 py-3 cursor-pointer uppercase';
      updateFilters();
      render();
    }

    function updateFilters() {
      const data = currentTab === 'lub' ? rawLub : rawCau;
      const marcas = [...new Set(data.map(i => i.marca))].filter(Boolean).sort();
      const categorias = [...new Set(data.map(i => currentTab === 'lub' ? i.linea : i.categoria))].filter(Boolean).sort();

      document.getElementById('fMar').innerHTML = '<option value="">MARCA (Todas)</option>' + marcas.map(m => `<option value="${m}">${m}</option>`).join('');
      document.getElementById('fCat').innerHTML = '<option value="">CATEGORÍA (Todas)</option>' + categorias.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    function render() {
      const container = document.getElementById('container');
      const search = document.getElementById('fSearch').value.toLowerCase();
      const mar = document.getElementById('fMar').value;
      const cat = document.getElementById('fCat').value;
      const data = currentTab === 'lub' ? rawLub : rawCau;

      let filtered = data.filter(i => {
        const textToSearch = (currentTab === 'lub' ? i.nombre : i.medida).toLowerCase() + " " + i.marca.toLowerCase();
        const matchesSearch = textToSearch.includes(search);
        const matchesMar = !mar || i.marca === mar;
        const matchesCat = !cat || (currentTab === 'lub' ? i.linea === cat : i.categoria === cat);
        return matchesSearch && matchesMar && matchesCat;
      });

      if(filtered.length === 0) {
        container.innerHTML = '<div class="col-span-full text-center py-20 text-gray-400">No se encontraron productos.</div>';
        return;
      }

      container.innerHTML = filtered.map(i => {
        const precio = currentTab === 'lub' ? i.precio : i.contado;
        const titulo = currentTab === 'lub' ? i.nombre : i.medida;
        const detalle = currentTab === 'lub' ? `${i.tipo} - ${i.empaque}` : i.categoria;

        return `
          <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 hover:border-red-300 transition-all group">
            <img src="${i.foto}" alt="${titulo}" class="product-image group-hover:scale-105 transition-transform" onerror="this.src='${IMG_FALLBACK}'">
            <div class="flex justify-between items-center mb-1">
              <span class="text-[10px] bg-red-100 text-red-700 px-2 py-0.5 rounded font-black uppercase">${i.marca}</span>
              ${i.ref ? `<span class="text-[10px] text-gray-400 font-mono">${i.ref}</span>` : ''}
            </div>
            <h3 class="font-bold text-gray-800 text-lg leading-tight mb-1 h-12 overflow-hidden">${titulo}</h3>
            <p class="text-xs text-gray-400 italic mb-4">${detalle}</p>
            <div class="flex justify-between items-center">
              <div class="flex flex-col">
                <span class="text-2xl font-black text-red-700 italic">$${precio.toFixed(2)}</span>
                ${currentTab === 'cau' ? `<span class="text-[9px] text-gray-400 font-bold">Crédito: $${i.credito.toFixed(2)}</span>` : ''}
              </div>
              <button onclick="addToCart('${i.id}', '${titulo}', ${precio})" class="bg-gray-800 hover:bg-red-700 text-white px-5 py-2 rounded-xl font-bold text-xs active:scale-95 transition shadow-md">AÑADIR</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function addToCart(id, name, price) {
      const item = cart.find(i => i.id === id);
      if(item) item.qty++; else cart.push({id, name, price, qty: 1});
      updateCartUI();
    }

    function updateCartUI() {
      const list = document.getElementById('cartItems');
      document.getElementById('badge').innerText = cart.reduce((a,b) => a + b.qty, 0);
      
      list.innerHTML = cart.map(i => `
        <div class="flex justify-between items-center bg-white p-3 border rounded-xl shadow-sm">
          <div class="flex-1 mr-3">
            <p class="text-[11px] font-bold leading-tight line-clamp-2">${i.name}</p>
            <p class="text-xs text-red-600 font-black">$${(i.price*i.qty).toFixed(2)}</p>
          </div>
          <div class="flex items-center gap-2">
            <button onclick="changeQty('${i.id}',-1)" class="w-7 h-7 bg-gray-50 border rounded-lg font-bold hover:bg-gray-200">-</button>
            <span class="text-xs font-bold w-4 text-center">${i.qty}</span>
            <button onclick="changeQty('${i.id}',1)" class="w-7 h-7 bg-gray-50 border rounded-lg font-bold hover:bg-gray-200">+</button>
          </div>
        </div>
      `).join('');

      const total = cart.reduce((a,b) => a + (b.price * b.qty), 0);
      document.getElementById('cartTotal').innerText = `$${total.toFixed(2)}`;
    }

    function changeQty(id, delta) {
      const item = cart.find(i => i.id === id);
      if(item) {
        item.qty += delta;
        if(item.qty <= 0) cart = cart.filter(i => i.id !== id);
      }
      updateCartUI();
    }

    function toggleCart() {
      document.getElementById('cart').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('hidden');
    }

    function procesarEnvio(metodo) {
      const nom = document.getElementById('cNombre').value;
      const mail = document.getElementById('cCorreo').value;
      const cod = document.getElementById('cPais').value;
      const tel = document.getElementById('cTelefono').value;
      const total = document.getElementById('cartTotal').innerText;

      if(!cart.length) return alert("El carrito está vacío.");
      if(!nom || !mail || !tel) return alert("Por favor, completa tus datos de contacto.");

      if(metodo === 'ws') {
        let msg = `*NUEVO PEDIDO - SUPER CAUCHOS*\n\n*Cliente:* ${nom}\n*Telf:* +${cod}${tel}\n\n`;
        cart.forEach(i => msg += `• ${i.name} [x${i.qty}] - $${(i.price*i.qty).toFixed(2)}\n`);
        msg += `\n*TOTAL: ${total}*`;
        window.open(`https://wa.me/${cod}${tel.replace(/\D/g, '')}?text=${encodeURIComponent(msg)}`, '_blank');
      } else {
        // Enviar por EmailJS
        const listaText = cart.map(i => `• ${i.name} (x${i.qty}) - $${(i.price * i.qty).toFixed(2)}`).join('\n');
        
        const params = {
          service_id: 'service_z64r2df',
          template_id: 'template_flf3eix',
          user_id: 'NdAFdUwfeMmVhLG-s', // También puedes ponerla aquí
          template_params: {
            name: nom,
            time: new Date().toLocaleString(),
            message: listaText,
            total: total,
            user_email: mail // Asegúrate que en EmailJS el campo "To Email" sea {{user_email}}
          }
        };

        emailjs.send(params.service_id, params.template_id, params.template_params)
          .then(() => {
            alert("✅ ¡Pedido enviado! Revisa tu correo: " + mail);
            cart = []; updateCartUI(); toggleCart();
          }, (err) => {
            alert("❌ Error al enviar correo: " + JSON.stringify(err));
          });
      }
    }
  </script>
</body>
</html>
